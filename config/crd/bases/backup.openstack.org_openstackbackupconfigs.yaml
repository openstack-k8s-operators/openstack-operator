                properties:
                  excludeLabelKeys:
                    description: |-
                      ExcludeLabelKeys is a list of label keys - resources with any of these labels are excluded
                      Example: ["service-cert", "osdp-service"] excludes service-cert and dataplane service secrets
                    items:
                      type: string
                    type: array
                  excludeNames:
                    description: |-
