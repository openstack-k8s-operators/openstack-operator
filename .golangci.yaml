version: 2

linters:
  # Enable specific linter
  # https://golangci-lint.run/usage/linters/#enabled-by-default
  enable:
    - errorlint
    - revive
    - ginkgolinter
    - govet
  settings:
    govet:
      disable:
        # TODO: re-enable once golangci-lint supports Go 1.26 inlining of generics
        - inline

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
